<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribed — The AI Hustle</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#060608;color:#f4f4f6;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{max-width:460px;width:100%;text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:56px 32px;backdrop-filter:blur(14px)}
    .icon{font-size:56px;margin-bottom:20px}
    h1{font-family:'Space Grotesk';font-size:30px;margin-bottom:14px;font-weight:700}
    p{color:#8a8a96;font-size:16px;line-height:1.6;margin-bottom:28px}
    .btn{display:inline-block;padding:14px 32px;border-radius:12px;background:#00ff9d;color:#000;font-weight:600;text-decoration:none;font-size:15px;transition:transform .15s}
    .btn:hover{transform:scale(.96)}
    #status-err h1{color:#ff3d71}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👋</div>
    <div id="status-ok">
      <h1>You're unsubscribed.</h1>
      <p>No hard feelings. You won't hear from <strong>The AI Hustle</strong> again. Come back anytime — the door's always open.</p>
      <a href="https://theaihustle.surge.sh" class="btn">Back to site →</a>
    </div>
    <div id="status-err" style="display:none">
      <h1>Something's off.</h1>
      <p>We couldn't find that unsubscribe link. It may have expired or already been used.</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const ok = params.get('status') !== 'error';
    document.getElementById('status-ok').style.display = ok ? '' : 'none';
    document.getElementById('status-err').style.display = ok ? 'none' : '';
  </script>
</body>
</html>
